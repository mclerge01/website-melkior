<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melkior Clergé</title>
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://melkiorclerge.ca/">
  <link rel="alternate" hreflang="fr" href="https://melkiorclerge.ca/fr/">
  <link rel="alternate" hreflang="fr-CA" href="https://melkiorclerge.ca/fr/">
  <link rel="alternate" hreflang="en" href="https://melkiorclerge.ca/en/">
  <link rel="alternate" hreflang="en-CA" href="https://melkiorclerge.ca/en/">
  <link rel="alternate" hreflang="x-default" href="https://melkiorclerge.ca/">
  <link rel="icon" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
  <script>
    (function () {
      var locale = navigator.languages && navigator.languages.length ? navigator.languages[0] : navigator.language || "";
      var target = /^en(\b|-)/i.test(locale) ? "/en/" : "/fr/";
      window.location.replace(target);
    })();
  </script>
</head>
<body class="language-fallback">
  <main class="container section text-center">
    <p class="eyebrow">Melkior Clergé</p>
    <h1 class="text-4xl font-bold mb-4">Choisissez votre langue</h1>
    <p class="text-light mb-8">Choose your language</p>
    <div class="flex justify-center gap-4 flex-wrap">
      <a class="btn btn-primary" href="/fr/">Français</a>
      <a class="btn btn-outline" href="/en/">English</a>
    </div>
  </main>
</body>
</html>
