name = "website-melkior"
main = "worker/index.js"
compatibility_date = "2026-06-11"
workers_dev = false

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

[vars]
GITHUB_CLIENT_ID = "Ov23lii7Cd2Hi6BAk24W"
TURNSTILE_SITE_KEY = "0x4AAAAAADiKO0ta5fWUPZ6z"
CONTACT_EMAIL = "consultation@melkiorclerge.ca"

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
run_worker_first = ["/api/*", "/", "/fr", "/fr/*", "/en", "/en/*"]

[[services]]
binding = "EMAIL_WORKER"
service = "email-sender"

[[routes]]
pattern = "melkiorclerge.ca"
custom_domain = true
